---
layout: default
---
<article class="project-page">
  <header class="project-header">
    <p class="project-meta">Project</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
      <p class="project-summary">{{ page.summary }}</p>
    {% endif %}
  </header>

  {% if page.image %}
    <figure class="project-hero">
      <img src="{{ page.image | relative_url }}" alt="Screenshot of {{ page.title }}" loading="lazy">
    </figure>
  {% endif %}

  <section class="project-content">
    {{ content }}
  </section>

  <p><a href="{{ '/' | relative_url }}">← Back to portfolio</a></p>
</article>
